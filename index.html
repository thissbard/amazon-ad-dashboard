<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon 广告数据中台</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d19;color:#e2e8f0;font-family:'DM Sans','JetBrains Mono',sans-serif;min-height:100vh}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0c1222}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
.card{background:linear-gradient(135deg,#0f172a 0%,#131c31 100%);border:1px solid #1e293b;border-radius:16px;animation:slideUp .5s ease both}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 14px;color:#64748b;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1e293b;background:#0a1020}
td{padding:9px 14px;border-bottom:1px solid #111827;font-variant-numeric:tabular-nums}
tr:hover td{background:rgba(59,130,246,.03)}
.hdr-btn{background:none;border:none;color:#64748b;cursor:pointer;font:inherit;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:0}
.hdr-btn:hover{color:#94a3b8}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px}
.region-btn{padding:7px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #1e293b;background:transparent;color:#64748b;font-family:inherit;transition:all .2s}
.region-btn:hover{border-color:#334155;color:#94a3b8}
.region-btn.active{background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(29,78,216,.3)}
.view-btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #1e293b;background:transparent;color:#64748b;font-family:inherit;transition:all .15s}
.view-btn.on{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:#64748b}
.loading .spinner{width:24px;height:24px;border:3px solid #1e293b;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div>连接 Supabase 加载数据...</div></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Line, ComposedChart, PieChart, Pie, Cell } = Recharts;

// ═══════════════════════════════════════
// Supabase 连接
// ═══════════════════════════════════════
const SUPABASE_URL = 'https://vgdjuowhybkipjufmaco.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZGp1b3doeWJraXBqdWZtYWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTcyMzUsImV4cCI6MjA5MTUzMzIzNX0.ayL75VKQpwC-AldTvQ93ulCamAZNXbH67UEHQKuSltg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 店铺按地区分组
const REGIONS = [
  { key:"us", label:"🇺🇸 美国" },{ key:"ca", label:"🇨🇦 加拿大" },
  { key:"mx", label:"🇲🇽 墨西哥" },{ key:"eu", label:"🇪🇺 欧洲" },
];
const COUNTRY_TO_REGION = {"美国":"us","加拿大":"ca","墨西哥":"mx","英国":"eu","德国":"eu","法国":"eu","意大利":"eu","爱尔兰":"eu","瑞典":"eu","西班牙":"eu"};
const COUNTRY_FLAG = {"英国":"🇬🇧","德国":"🇩🇪","法国":"🇫🇷","意大利":"🇮🇹","爱尔兰":"🇮🇪","瑞典":"🇸🇪","西班牙":"🇪🇸"};

const PIE_COLORS = ["#3b82f6","#8b5cf6","#ec4899","#f97316","#22c55e","#06b6d4","#eab308","#ef4444","#a78bfa","#f472b6","#34d399","#fb923c"];
const fmtUSD = n => n!=null ? `$${Number(n).toFixed(2)}` : "—";
const fmtPct = n => n!=null ? `${(n*100).toFixed(1)}%` : "—";
const fmtInt = n => n!=null ? Number(n).toLocaleString() : "—";
const acosColor = v => { if(v==null) return "#475569"; if(v<0.25) return "#34d399"; if(v<0.40) return "#fbbf24"; return "#f87171"; };

const healthTag = c => {
  if(c.sales>0 && c.acos!=null && c.acos<0.15) return {label:"🌟 明星",bg:"#052e16",color:"#4ade80"};
  if(c.sales>0 && c.acos!=null && c.acos<0.30) return {label:"✅ 健康",bg:"#0c2d1b",color:"#86efac"};
  if(c.sales>0 && c.acos!=null && c.acos<0.45) return {label:"⚠️ 关注",bg:"#422006",color:"#fbbf24"};
  if(c.cost>5 && c.orders===0) return {label:"🔴 浪费",bg:"#450a0a",color:"#f87171"};
  if(c.cost>0 && c.orders===0) return {label:"❄️ 冷启",bg:"#1e1b4b",color:"#a78bfa"};
  if(c.sales>0) return {label:"⚠️ 偏高",bg:"#422006",color:"#fbbf24"};
  return null;
};

const CTooltip = ({active,payload,label}) => {
  if(!active||!payload?.length) return null;
  return <div style={{background:"#0c1222",border:"1px solid #1e293b",borderRadius:10,padding:"10px 14px",fontSize:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
    <div style={{color:"#64748b",fontWeight:600,marginBottom:6}}>{label}</div>
    {payload.map((p,i) => <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
      <div style={{width:8,height:8,borderRadius:2,background:p.color}}/>
      <span style={{color:"#94a3b8"}}>{p.name}:</span>
      <span style={{color:"#e2e8f0",fontWeight:600}}>{p.name==="ACOS"?fmtPct(p.value):fmtUSD(p.value)}</span>
    </div>)}
  </div>;
};

function App() {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [sellers, setSellers] = useState([]);
  const [dailyData, setDailyData] = useState({});
  const [campaignData, setCampaignData] = useState({});
  const [region, setRegion] = useState("us");
  const [sid, setSid] = useState(null);
  const [sortKey, setSortKey] = useState("cost");
  const [sortDir, setSortDir] = useState("desc");
  const [view, setView] = useState("table");
  const [lastUpdate, setLastUpdate] = useState("");

  // 加载数据
  useEffect(() => {
    (async () => {
      try {
        // 1. 店铺列表
        const {data:sl} = await sb.from('sellers').select('sid,name,country').eq('status',1);
        const grouped = {};
        (sl||[]).forEach(s => {
          const rk = COUNTRY_TO_REGION[s.country] || "other";
          if(!grouped[rk]) grouped[rk]=[];
          const flag = COUNTRY_FLAG[s.country] || "";
          const shortName = s.name.replace(/-US$|-CA$|-MX$|-UK$|-DE$|-FR$|-IT$|-IE$|-SE$|-ES$/,'').replace(/[（）]/g,'');
          grouped[rk].push({sid:s.sid, name: flag ? `${flag} ${shortName}` : shortName, fullName:s.name});
        });
        Object.values(grouped).forEach(arr => arr.sort((a,b) => a.name.localeCompare(b.name)));
        setSellers(grouped);

        // 2. 每日汇总
        const {data:dr} = await sb.from('ad_daily_reports').select('sid,report_date,cost,sales,orders,clicks,impressions');
        const daily = {};
        (dr||[]).forEach(r => {
          if(!daily[r.sid]) daily[r.sid] = {};
          const d = r.report_date.slice(5); // MM-DD
          if(!daily[r.sid][d]) daily[r.sid][d] = {date:d, cost:0, sales:0, orders:0, clicks:0, imp:0};
          const dd = daily[r.sid][d];
          dd.cost += +r.cost; dd.sales += +r.sales; dd.orders += +r.orders;
          dd.clicks += +r.clicks; dd.imp += +r.impressions;
        });
        const dailyArr = {};
        Object.entries(daily).forEach(([s,dates]) => {
          dailyArr[s] = Object.values(dates).sort((a,b) => a.date.localeCompare(b.date));
          dailyArr[s].forEach(d => d.acos = d.sales > 0 ? d.cost/d.sales : null);
        });
        setDailyData(dailyArr);

        // 3. Campaign 汇总
        const {data:cr} = await sb.from('ad_daily_reports').select('sid,campaign_id,cost,sales,orders,clicks,impressions');
        const camps = {};
        (cr||[]).forEach(r => {
          const key = `${r.sid}-${r.campaign_id}`;
          if(!camps[key]) camps[key] = {sid:r.sid, cid:r.campaign_id, cost:0, sales:0, orders:0, clicks:0, imp:0};
          const c = camps[key];
          c.cost += +r.cost; c.sales += +r.sales; c.orders += +r.orders;
          c.clicks += +r.clicks; c.imp += +r.impressions;
        });
        const campBySid = {};
        Object.values(camps).forEach(c => {
          if(!campBySid[c.sid]) campBySid[c.sid] = [];
          campBySid[c.sid].push({
            name: `SP-Campaign-${String(c.cid).slice(-6)}`,
            cost: +c.cost.toFixed(2), sales: +c.sales.toFixed(2), orders: c.orders,
            imp: c.imp, clicks: c.clicks,
            acos: c.sales > 0 ? +(c.cost/c.sales).toFixed(4) : null,
            roas: c.cost > 0 ? +(c.sales/c.cost).toFixed(2) : 0,
            cpc: c.clicks > 0 ? +(c.cost/c.clicks).toFixed(2) : 0,
          });
        });
        Object.values(campBySid).forEach(arr => arr.sort((a,b) => b.cost - a.cost));
        setCampaignData(campBySid);

        // 默认选中第一个有数据的店铺
        const firstWithData = (grouped["us"]||[]).find(s => dailyArr[s.sid]);
        if(firstWithData) setSid(firstWithData.sid);
        setLastUpdate(new Date().toLocaleString('zh-CN'));
        setLoading(false);
      } catch(e) {
        setError(e.message);
        setLoading(false);
      }
    })();
  }, []);

  const regionStores = sellers[region] || [];
  const currentStore = regionStores.find(s => s.sid === sid) || regionStores[0] || {sid:0,name:"—"};
  const daily = dailyData[sid] || [];
  const campaigns = campaignData[sid] || [];

  const switchRegion = r => { setRegion(r); const f=(sellers[r]||[])[0]; if(f) setSid(f.sid); };

  const totals = useMemo(() => {
    const cost=daily.reduce((s,d)=>s+d.cost,0), sales=daily.reduce((s,d)=>s+d.sales,0);
    const orders=daily.reduce((s,d)=>s+d.orders,0), clicks=daily.reduce((s,d)=>s+(d.clicks||0),0);
    const imp=daily.reduce((s,d)=>s+(d.imp||0),0);
    return {cost,sales,orders,clicks,imp, acos:sales>0?cost/sales:null, roas:cost>0?sales/cost:null,
      ctr:imp>0?clicks/imp:null, cvr:clicks>0?orders/clicks:null, days:daily.length};
  }, [daily]);

  const sorted = useMemo(() => [...campaigns].sort((a,b) => {
    const va=a[sortKey]??-Infinity, vb=b[sortKey]??-Infinity;
    return sortDir==="desc"?vb-va:va-vb;
  }), [campaigns,sortKey,sortDir]);

  const maxCost = Math.max(...campaigns.map(c=>c.cost),1);
  const doSort = k => { if(sortKey===k) setSortDir(d=>d==="desc"?"asc":"desc"); else {setSortKey(k);setSortDir("desc");} };
  const SI = ({k}) => <span style={{marginLeft:3,opacity:sortKey===k?.9:.25,fontSize:9}}>{sortKey===k&&sortDir==="asc"?"▲":"▼"}</span>;

  const healthStats = useMemo(() => {
    let stars=0,healthy=0,warning=0,waste=0;
    campaigns.forEach(c => { const t=healthTag(c); if(!t) return;
      if(t.label.includes("明星")) stars++; else if(t.label.includes("健康")) healthy++;
      else if(t.label.includes("关注")||t.label.includes("偏高")) warning++;
      else if(t.label.includes("浪费")) waste++;
    });
    return {stars,healthy,warning,waste};
  }, [campaigns]);

  // 烧钱王
  const burnKings = useMemo(() => [...campaigns].filter(c=>c.cost>0&&c.orders===0).sort((a,b)=>b.cost-a.cost).slice(0,5), [campaigns]);
  const totalWaste = burnKings.reduce((s,c)=>s+c.cost,0);
  // 需优化
  const worst = useMemo(() => [...campaigns].filter(c=>(c.acos!=null&&c.acos>0.35)||(c.cost>3&&c.orders===0)).sort((a,b)=>b.cost-a.cost), [campaigns]);

  const pieData = campaigns.filter(c=>c.cost>0).slice(0,12).map((c,i) => ({name:c.name,value:c.cost,fill:PIE_COLORS[i%PIE_COLORS.length]}));

  if(loading) return <div className="loading"><div className="spinner"></div>连接 Supabase 加载数据...</div>;
  if(error) return <div className="loading" style={{color:"#f87171"}}>连接失败: {error}</div>;

  return <>
    <div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:3,height:32,background:"linear-gradient(180deg,#3b82f6,#8b5cf6,#ec4899)",borderRadius:2}}/>
            <h1 style={{fontSize:21,fontWeight:700,color:"#f1f5f9",letterSpacing:-1}}>Amazon 广告数据中台</h1>
          </div>
          <p style={{fontSize:11,color:"#475569",marginTop:5,marginLeft:13}}>Supabase 实时数据 · {currentStore.fullName || currentStore.name}</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:600,background:"#052e16",color:"#4ade80",border:"1px solid #14532d",animation:"pulse 2s infinite"}}>● LIVE</div>
          <span style={{fontSize:10,color:"#334155"}}>{lastUpdate}</span>
        </div>
      </div>

      {/* Region Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {REGIONS.map(r => <button key={r.key} className={`region-btn ${r.key===region?"active":""}`}
          onClick={()=>switchRegion(r.key)}>{r.label} <span style={{fontSize:10,opacity:.7}}>({(sellers[r.key]||[]).length})</span></button>)}
      </div>
      {/* Store Selector */}
      <div style={{display:"flex",gap:6,marginBottom:16,alignItems:"center"}}>
        <span style={{fontSize:10,color:"#475569"}}>店铺:</span>
        <select value={sid||""} onChange={e=>setSid(+e.target.value)} style={{background:"#0f172a",color:"#e2e8f0",border:"1px solid #1e293b",borderRadius:8,padding:"5px 10px",fontSize:11,fontFamily:"inherit",outline:"none",cursor:"pointer",maxWidth:220}}>
          {regionStores.map(s => <option key={s.sid} value={s.sid}>{s.name}{dailyData[s.sid]?" ✦":""}</option>)}
        </select>
        <span style={{fontSize:9,color:"#334155"}}>✦ = 有数据</span>
      </div>

      {/* KPI Cards */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[
          {icon:"💰",label:"总花费",value:fmtUSD(totals.cost),sub:`日均 ${fmtUSD(totals.cost/(totals.days||1))}`,color:"#3b82f6"},
          {icon:"🛒",label:"广告销售",value:fmtUSD(totals.sales),sub:`${totals.orders} 单`,color:"#34d399"},
          {icon:"📉",label:"ACOS",value:fmtPct(totals.acos),sub:totals.acos!=null?(totals.acos<0.25?"✅ 优秀":totals.acos<0.40?"⚠️ 关注":"🔴 偏高"):"—",color:acosColor(totals.acos)},
          {icon:"📊",label:"ROAS",value:totals.roas!=null?`${totals.roas.toFixed(2)}x`:"—",sub:"投产比",color:"#a78bfa"},
          {icon:"🖱",label:"CTR",value:fmtPct(totals.ctr),sub:`${fmtInt(totals.clicks)}/${fmtInt(totals.imp)}`,color:"#06b6d4"},
          {icon:"🎯",label:"CVR",value:fmtPct(totals.cvr),sub:`${totals.orders}单/${totals.clicks}次`,color:"#f97316"},
        ].map((k,i) => <div key={i} style={{flex:"1 1 100px",minWidth:100,padding:"10px 12px",background:"linear-gradient(135deg,#0f172a,#131c31)",border:"1px solid #1e293b",borderRadius:12,position:"relative",overflow:"hidden",animation:`slideUp .4s ease both`,animationDelay:`${i*0.05}s`}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${k.color},transparent)`}}/>
          <div style={{fontSize:9,color:"#64748b",marginBottom:2,letterSpacing:.3}}>{k.icon} {k.label}</div>
          <div style={{fontSize:17,fontWeight:700,color:k.label==="ACOS"?k.color:"#e2e8f0",letterSpacing:-0.5}}>{k.value}</div>
          <div style={{fontSize:9,color:"#475569",marginTop:1}}>{k.sub}</div>
        </div>)}
      </div>

      {/* Health Bar */}
      <div className="card" style={{padding:"10px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
        <span style={{fontSize:11,fontWeight:600,color:"#64748b"}}>Campaign 健康度:</span>
        <span style={{fontSize:11,color:"#4ade80"}}>🌟{healthStats.stars}</span>
        <span style={{fontSize:11,color:"#86efac"}}>✅{healthStats.healthy}</span>
        <span style={{fontSize:11,color:"#fbbf24"}}>⚠️{healthStats.warning}</span>
        <span style={{fontSize:11,color:"#f87171"}}>🔴{healthStats.waste}</span>
      </div>

      {/* Chart */}
      {daily.length > 1 && <div className="card" style={{padding:"16px 12px 6px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"0 4px"}}>
          <span style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>📈 每日趋势</span>
          <div style={{display:"flex",gap:12,fontSize:10,color:"#64748b"}}>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#3b82f6",marginRight:3,verticalAlign:"middle"}}/>花费</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#34d399",marginRight:3,verticalAlign:"middle"}}/>销售</span>
            <span><span style={{display:"inline-block",width:8,height:3,borderRadius:2,background:"#fbbf24",marginRight:3,verticalAlign:"middle"}}/>ACOS</span>
          </div>
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <ComposedChart data={daily} margin={{top:5,right:30,left:0,bottom:5}}>
            <defs>
              <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#3b82f6" stopOpacity={0.9}/><stop offset="100%" stopColor="#3b82f6" stopOpacity={0.5}/></linearGradient>
              <linearGradient id="gS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#34d399" stopOpacity={0.9}/><stop offset="100%" stopColor="#34d399" stopOpacity={0.5}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
            <XAxis dataKey="date" tick={{fill:"#475569",fontSize:10}} axisLine={{stroke:"#1e293b"}} tickLine={false}/>
            <YAxis yAxisId="l" tick={{fill:"#475569",fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis yAxisId="r" orientation="right" tick={{fill:"#475569",fontSize:10}} axisLine={false} tickLine={false} domain={[0,1]} tickFormatter={v=>`${(v*100).toFixed(0)}%`}/>
            <Tooltip content={<CTooltip/>}/>
            <Bar yAxisId="l" dataKey="cost" name="花费" fill="url(#gC)" radius={[4,4,0,0]} barSize={20}/>
            <Bar yAxisId="l" dataKey="sales" name="销售额" fill="url(#gS)" radius={[4,4,0,0]} barSize={20}/>
            <Line yAxisId="r" type="monotone" dataKey="acos" name="ACOS" stroke="#fbbf24" strokeWidth={2} dot={{r:4,fill:"#fbbf24",stroke:"#0f172a",strokeWidth:2}} connectNulls/>
          </ComposedChart>
        </ResponsiveContainer>
      </div>}

      {/* Insights: 烧钱王 + 需优化 */}
      {(burnKings.length>0 || worst.length>0) && <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        {burnKings.length>0 && <div className="card" style={{padding:14}}>
          <div style={{fontSize:11,fontWeight:600,color:"#f87171",marginBottom:10}}>🔥 烧钱王 TOP 5</div>
          {burnKings.map((c,i) => <div key={i} style={{padding:"8px 10px",borderRadius:8,border:"1px solid #1e293b",background:"rgba(15,23,42,.6)",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
              <span style={{color:"#e2e8f0",fontWeight:500,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]} {c.name}</span>
              <span style={{color:"#f87171",fontWeight:700}}>{fmtUSD(c.cost)}</span>
            </div>
            <div style={{fontSize:9,color:"#64748b",marginTop:3}}>{fmtInt(c.imp)} 展示 · {c.clicks} 点击 · 零出单</div>
          </div>)}
          <div style={{fontSize:9,color:"#f87171",fontWeight:600}}>浪费: {fmtUSD(totalWaste)}（占{totals.cost>0?((totalWaste/totals.cost)*100).toFixed(0):0}%）</div>
        </div>}
        {worst.length>0 && <div className="card" style={{padding:14}}>
          <div style={{fontSize:11,fontWeight:600,color:"#fbbf24",marginBottom:10}}>💀 需优化（共{worst.length}个）</div>
          {worst.slice(0,5).map((c,i) => <div key={i} style={{padding:"8px 10px",borderRadius:8,border:"1px solid #422006",background:"rgba(15,23,42,.6)",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11}}>
              <span style={{color:"#e2e8f0",fontWeight:500,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
              <span className="tag" style={{background:c.orders===0?"#450a0a":"#422006",color:c.orders===0?"#f87171":"#fbbf24"}}>{c.orders===0?"零出单":`ACOS ${fmtPct(c.acos)}`}</span>
            </div>
            <div style={{fontSize:9,color:"#64748b",marginTop:3}}>花费 {fmtUSD(c.cost)} · CPC {fmtUSD(c.cpc)}</div>
          </div>)}
        </div>}
      </div>}

      {/* Campaign Table / Pie */}
      <div className="card" style={{overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #1e293b",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <span style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>📋 Campaign 明细 ({sorted.length})</span>
          <div style={{display:"flex",gap:6}}>
            <button className={`view-btn ${view==="table"?"on":""}`} onClick={()=>setView("table")}>表格</button>
            <button className={`view-btn ${view==="pie"?"on":""}`} onClick={()=>setView("pie")}>饼图</button>
          </div>
        </div>
        {view==="pie" ? <div style={{padding:16,display:"flex",alignItems:"center",justifyContent:"center",gap:20,flexWrap:"wrap"}}>
          <ResponsiveContainer width={240} height={240}>
            <PieChart><Pie data={pieData} dataKey="value" cx="50%" cy="50%" outerRadius={100} innerRadius={40} paddingAngle={2}>
              {pieData.map((e,i) => <Cell key={i} fill={e.fill} stroke="#0f172a" strokeWidth={2}/>)}
            </Pie><Tooltip formatter={v=>fmtUSD(v)} contentStyle={{background:"#0c1222",border:"1px solid #1e293b",borderRadius:8,fontSize:11}}/></PieChart>
          </ResponsiveContainer>
          <div style={{fontSize:10,lineHeight:2}}>
            {pieData.map((p,i) => <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:8,height:8,borderRadius:2,background:p.fill,flexShrink:0}}/>
              <span style={{color:"#94a3b8",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
              <span style={{color:"#e2e8f0",fontWeight:600,marginLeft:"auto"}}>{fmtUSD(p.value)}</span>
            </div>)}
          </div>
        </div> : <div style={{overflowX:"auto"}}>
          <table><thead><tr>
            <th>Campaign</th><th>状态</th>
            <th style={{textAlign:"right"}}><button className="hdr-btn" onClick={()=>doSort("cost")}>花费<SI k="cost"/></button></th>
            <th style={{textAlign:"right"}}><button className="hdr-btn" onClick={()=>doSort("sales")}>销售<SI k="sales"/></button></th>
            <th style={{textAlign:"right"}}><button className="hdr-btn" onClick={()=>doSort("orders")}>单<SI k="orders"/></button></th>
            <th style={{textAlign:"right"}}><button className="hdr-btn" onClick={()=>doSort("acos")}>ACOS<SI k="acos"/></button></th>
            <th style={{textAlign:"right"}}><button className="hdr-btn" onClick={()=>doSort("roas")}>ROAS<SI k="roas"/></button></th>
            <th style={{minWidth:60}}>占比</th>
          </tr></thead><tbody>
            {sorted.slice(0,30).map((c,i) => { const ht=healthTag(c); return <tr key={i}>
              <td><div style={{fontWeight:500,fontSize:11,color:"#e2e8f0",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div></td>
              <td>{ht && <span className="tag" style={{background:ht.bg,color:ht.color}}>{ht.label}</span>}</td>
              <td style={{textAlign:"right",fontWeight:600,color:"#e2e8f0"}}>{fmtUSD(c.cost)}</td>
              <td style={{textAlign:"right",color:c.sales>0?"#34d399":"#334155",fontWeight:c.sales>0?600:400}}>{c.sales>0?fmtUSD(c.sales):"—"}</td>
              <td style={{textAlign:"right",color:c.orders>0?"#e2e8f0":"#334155"}}>{c.orders||"—"}</td>
              <td style={{textAlign:"right",fontWeight:600,color:acosColor(c.acos)}}>{fmtPct(c.acos)}</td>
              <td style={{textAlign:"right",color:c.roas>0?"#a78bfa":"#334155"}}>{c.roas>0?`${c.roas}x`:"—"}</td>
              <td><div style={{width:"100%",height:4,background:"#1e293b",borderRadius:2,overflow:"hidden"}}>
                <div style={{width:`${(c.cost/maxCost*100).toFixed(1)}%`,height:"100%",borderRadius:2,background:c.sales>0?"linear-gradient(90deg,#3b82f6,#34d399)":"#3b82f6"}}/>
              </div></td>
            </tr>;})}
          </tbody></table>
        </div>}
      </div>

      {/* Footer */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",fontSize:10,color:"#334155",background:"#0a0f1a",borderRadius:8,border:"1px solid #111827"}}>
        <span>⚡ 领星 ERP → Supabase → 实时看板</span>
        <span>{Object.values(sellers).reduce((s,a)=>s+a.length,0)} 店铺 · {Object.keys(dailyData).length} 有数据</span>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
