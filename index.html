<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon 数据中台 · 实时看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080c14;--card:#0f1629;--border:#1a2340;--accent:#f59e0b;--green:#10b981;--red:#ef4444;
  --blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;--text:#e2e8f0;--muted:#64748b;--dim:#334155;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}
.wrap{max-width:1280px;margin:0 auto;padding:20px 24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{color:var(--muted);font-size:12px;margin-top:4px}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.kpi .val{font-size:26px;font-weight:800;line-height:1.1}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;animation:fadeUp .5s ease both}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card-head span{font-weight:700;font-size:14px}
.card-head .info{font-size:11px;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:#0a0f1f}
td{padding:10px 14px;border-top:1px solid var(--border)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-done{background:#10b98120;color:var(--green)}
.tag-partial{background:#f59e0b20;color:var(--accent)}
.progress-bar{width:70px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.chart-wrap{padding:20px;position:relative;height:340px}
.tabs{display:flex;gap:4px}
.tabs button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--card);color:var(--muted);transition:all .2s}
.tabs button.on{background:var(--accent);color:var(--bg)}
.store-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.store-btn.on{border-color:var(--accent);color:var(--accent);background:#f59e0b10}
.store-btn:hover{border-color:var(--accent)}
.footer{display:flex;justify-content:space-between;padding:10px 14px;font-size:10px;color:var(--dim);background:#0a0f1a;border-radius:8px;border:1px solid #111827;margin-top:20px;flex-wrap:wrap;gap:8px}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.err{color:var(--red);padding:20px;font-size:13px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">⏳ 正在连接 Supabase 数据库...</div>
</div>
<script>
// ═══════════════════════════════════════
// Supabase 连接
// ═══════════════════════════════════════
const SB_URL = 'https://vgdjuowhybkipjufmaco.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnZGp1b3doeWJraXBqdWZtYWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTcyMzUsImV4cCI6MjA5MTUzMzIzNX0.ayL75VKQpwC-AldTvQ93ulCamAZNXbH67UEHQKuSltg';

async function sbQuery(table, params = '') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

// ═══════════════════════════════════════
// 数据加载
// ═══════════════════════════════════════
let DATA = {};

async function loadAll() {
  try {
    const [stores, daily, asins, keywords] = await Promise.all([
      sbQuery('v_store_ad_summary'),
      sbQuery('ad_daily_reports', 'select=sid,report_date,cost,sales,orders,clicks,impressions&order=report_date'),
      sbQuery('asin_catalog', 'select=asin,product_line,tier,price,rating,review_count,bsr_rank,monthly_sales,monthly_revenue,brand,status&status=eq.active&order=monthly_revenue.desc.nullslast&limit=50'),
      sbQuery('keyword_tracker', 'select=keyword,product_line,search_volume,word_type,priority&order=search_volume.desc'),
    ]);

    // 按 sid 聚合日度数据
    const dailyBySid = {};
    daily.forEach(r => {
      if (!dailyBySid[r.sid]) dailyBySid[r.sid] = [];
      dailyBySid[r.sid].push(r);
    });

    DATA = { stores, dailyBySid, asins, keywords };
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="err">❌ 连接失败: ${e.message}<br><br>请检查 Supabase 项目是否在线</div>`;
  }
}

// ═══════════════════════════════════════
// 辅助函数
// ═══════════════════════════════════════
const fmtUSD = n => n != null ? `$${Number(n).toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})}` : '—';
const fmtPct = n => n != null ? `${Number(n).toFixed(1)}%` : '—';
const acosClass = v => { v = Number(v); if (v < 25) return 'color:var(--green)'; if (v < 35) return 'color:var(--accent)'; return 'color:var(--red)'; };

let currentTab = 'overview';
let selectedSid = null;

function render() {
  const { stores, dailyBySid, asins, keywords } = DATA;
  const totalCost = stores.reduce((s,r) => s + Number(r.total_cost), 0);
  const totalSales = stores.reduce((s,r) => s + Number(r.total_sales), 0);
  const totalOrders = stores.reduce((s,r) => s + r.total_orders, 0);
  const totalDays = stores.reduce((s,r) => s + r.total_days, 0);
  const doneStores = stores.filter(s => s.total_days >= 14).length;
  const totalKwVol = keywords.reduce((s,k) => s + k.search_volume, 0);

  // Tier counts
  const tiers = {};
  asins.forEach(a => { tiers[a.tier] = (tiers[a.tier]||0) + 1; });

  const now = new Date().toLocaleString('zh-CN', {timeZone:'America/Los_Angeles'});

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <h1>Amazon 数据中台</h1>
        <div class="sub"><span class="live-dot"></span>Supabase 实时 · 数据截至 ${stores[0]?.last_date || '—'} · 刷新于 ${now}</div>
      </div>
      <div class="tabs">
        <button class="${currentTab==='overview'?'on':''}" onclick="switchTab('overview')">总览</button>
        <button class="${currentTab==='trend'?'on':''}" onclick="switchTab('trend')">广告趋势</button>
        <button class="${currentTab==='asin'?'on':''}" onclick="switchTab('asin')">ASIN目录</button>
        <button class="${currentTab==='keywords'?'on':''}" onclick="switchTab('keywords')">关键词库</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="label">Tier 1 店铺</div><div class="val mono" style="color:var(--green)">${doneStores}/${stores.length}</div><div class="sub">14天完整覆盖</div></div>
      <div class="kpi"><div class="label">总广告花费</div><div class="val mono" style="color:var(--accent)">${fmtUSD(totalCost)}</div><div class="sub">${totalDays}天数据</div></div>
      <div class="kpi"><div class="label">总广告销售</div><div class="val mono" style="color:var(--green)">${fmtUSD(totalSales)}</div><div class="sub">${totalOrders} 单</div></div>
      <div class="kpi"><div class="label">ASIN 目录</div><div class="val mono" style="color:var(--blue)">${asins.length}</div><div class="sub">Hero:${tiers.hero||0} Std:${tiers.standard||0} Tail:${tiers.tail||0}</div></div>
      <div class="kpi"><div class="label">关键词库</div><div class="val mono" style="color:var(--purple)">${keywords.length}</div><div class="sub">${(totalKwVol/10000).toFixed(0)}万月搜索量</div></div>
    </div>

    <div id="tab-content"></div>

    <div class="footer">
      <span>⚡ 领星 ERP → Claude MCP → Supabase → Vercel 看板</span>
      <span>${stores.length} 店铺 · ${totalDays} 天数据 · 每5分钟自动刷新</span>
    </div>
  `;

  renderTab();
}

function switchTab(t) { currentTab = t; render(); }

function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (currentTab === 'overview') renderOverview(el);
  else if (currentTab === 'trend') renderTrend(el);
  else if (currentTab === 'asin') renderAsin(el);
  else if (currentTab === 'keywords') renderKeywords(el);
}

// ═══════════════════════════════════════
// 总览
// ═══════════════════════════════════════
function renderOverview(el) {
  const { stores } = DATA;
  let rows = stores.map(s => {
    const pct = Math.round(s.total_days / 14 * 100);
    const done = s.total_days >= 14;
    return `<tr>
      <td style="font-weight:600">${s.store}</td>
      <td><span class="mono" style="font-weight:700;${done?'color:var(--green)':'color:var(--accent)'}">${s.total_days}/14</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${done?'var(--green)':'var(--accent)'}"></div></div></td>
      <td style="${acosClass(s.acos_pct)}" class="mono">${s.acos_pct ? fmtPct(s.acos_pct) : '—'}</td>
      <td class="mono">${fmtUSD(s.total_cost)}</td>
      <td class="mono" style="color:var(--green)">${fmtUSD(s.total_sales)}</td>
      <td class="mono">${s.total_orders}</td>
      <td class="mono" style="color:var(--muted)">${fmtUSD(s.avg_daily_cost)}/d</td>
      <td><span class="tag ${done?'tag-done':'tag-partial'}">${done?'✅ 完成':'⏳ 进行'}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="card" style="animation-delay:.1s">
      <div class="card-head"><span>📊 店铺广告覆盖</span><span class="info">${stores[0]?.first_date} → ${stores[0]?.last_date} · 14天窗口</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>店铺</th><th>天数</th><th>ACOS</th><th>花费</th><th>销售</th><th>订单</th><th>日均</th><th>状态</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
// 广告趋势
// ═══════════════════════════════════════
function renderTrend(el) {
  const { stores, dailyBySid } = DATA;
  const storeButtons = stores.map(s =>
    `<button class="store-btn ${selectedSid==s.sid?'on':''}" onclick="selectStore(${s.sid})">${s.store.replace(/-US$/,'')} (${s.total_days}d)</button>`
  ).join('');

  if (!selectedSid) selectedSid = stores[0]?.sid;
  const days = dailyBySid[selectedSid] || [];

  // Aggregate by date
  const byDate = {};
  days.forEach(r => {
    if (!byDate[r.report_date]) byDate[r.report_date] = {cost:0,sales:0,orders:0,clicks:0};
    const d = byDate[r.report_date];
    d.cost += Number(r.cost); d.sales += Number(r.sales); d.orders += r.orders; d.clicks += r.clicks;
  });
  const sorted = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0]));
  const labels = sorted.map(([d]) => d.slice(5));
  const costs = sorted.map(([,v]) => Math.round(v.cost));
  const sales = sorted.map(([,v]) => Math.round(v.sales));
  const acosArr = sorted.map(([,v]) => v.sales > 0 ? Math.round(v.cost/v.sales*1000)/10 : null);

  const totalC = costs.reduce((s,v)=>s+v,0);
  const totalS = sales.reduce((s,v)=>s+v,0);
  const totalO = sorted.reduce((s,[,v])=>s+v.orders,0);

  el.innerHTML = `
    <div class="card" style="animation-delay:.1s">
      <div class="card-head">
        <span>📈 广告日趋势</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${storeButtons}</div>
      </div>
      <div style="padding:12px 20px;font-size:12px;color:var(--muted)">
        花费 <strong class="mono" style="color:var(--text)">${fmtUSD(totalC)}</strong> · 
        销售 <strong class="mono" style="color:var(--green)">${fmtUSD(totalS)}</strong> · 
        ${totalO}单 · 
        ACOS <strong class="mono" style="${acosClass(totalS>0?totalC/totalS*100:0)}">${totalS>0?fmtPct(totalC/totalS*100):'—'}</strong>
      </div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  `;

  // Render chart
  const ctx = document.getElementById('trendChart');
  if (ctx) {
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '销售', data: sales, backgroundColor: '#10b98180', borderRadius: 6, order: 2 },
          { label: '花费', data: costs, backgroundColor: '#ef444480', borderRadius: 6, order: 2 },
          { label: 'ACOS%', data: acosArr, type: 'line', borderColor: '#f59e0b', borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#f59e0b', yAxisID: 'y1', order: 1 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#64748b', font: { size: 11 } } } },
        scales: {
          x: { ticks: { color: '#475569', font: { size: 11 } }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#475569', font: { size: 11 }, callback: v => '$'+v }, grid: { color: '#1e293b' } },
          y1: { position: 'right', min: 0, max: 60, ticks: { color: '#f59e0b', font: { size: 11 }, callback: v => v+'%' }, grid: { display: false } },
        }
      }
    });
  }
}

function selectStore(sid) { selectedSid = sid; render(); }

// ═══════════════════════════════════════
// ASIN 目录
// ═══════════════════════════════════════
function renderAsin(el) {
  const { asins } = DATA;
  const tierColor = t => t==='hero'?'var(--accent)':t==='standard'?'var(--blue)':'var(--dim)';
  let rows = asins.filter(a => a.monthly_sales > 0 || a.tier !== 'tail').slice(0, 30).map(a => `<tr>
    <td><span style="color:${tierColor(a.tier)};font-weight:700;font-size:11px;text-transform:uppercase">${a.tier}</span></td>
    <td class="mono" style="font-size:12px">${a.asin}</td>
    <td style="font-size:12px">${a.product_line || '—'}</td>
    <td class="mono">${a.price ? '$'+Number(a.price).toFixed(0) : '—'}</td>
    <td class="mono">${a.rating || '—'}</td>
    <td class="mono">${a.review_count || 0}</td>
    <td class="mono">${a.bsr_rank ? '#'+Number(a.bsr_rank).toLocaleString() : '—'}</td>
    <td class="mono" style="color:var(--green);font-weight:600">${a.monthly_sales || 0}</td>
    <td class="mono" style="color:var(--green)">${a.monthly_revenue ? fmtUSD(a.monthly_revenue) : '—'}</td>
  </tr>`).join('');

  el.innerHTML = `
    <div class="card" style="animation-delay:.1s">
      <div class="card-head"><span>📦 ASIN 目录 (Hero + Standard)</span><span class="info">${asins.length} 活跃 ASIN</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Tier</th><th>ASIN</th><th>产品线</th><th>价格</th><th>评分</th><th>评论</th><th>BSR</th><th>月销</th><th>月收入</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
// 关键词库
// ═══════════════════════════════════════
function renderKeywords(el) {
  const { keywords } = DATA;
  // Group by product_line
  const byLine = {};
  keywords.forEach(k => {
    if (!byLine[k.product_line]) byLine[k.product_line] = { kw: 0, vol: 0, high: 0 };
    byLine[k.product_line].kw++;
    byLine[k.product_line].vol += k.search_volume;
    if (k.priority === 'high') byLine[k.product_line].high++;
  });
  const lines = Object.entries(byLine).sort((a,b) => b[1].vol - a[1].vol);
  const maxVol = lines[0]?.[1].vol || 1;

  let linesHtml = lines.map(([name, d]) => `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-weight:600;font-size:13px">${name}</span>
        <span class="mono" style="color:var(--cyan);font-size:12px">${(d.vol/1000).toFixed(0)}K</span>
      </div>
      <div style="width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:4px">
        <div style="width:${d.vol/maxVol*100}%;height:100%;background:var(--cyan);border-radius:2px"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${d.kw}词 · ${d.high}个高优</div>
    </div>
  `).join('');

  let kwRows = keywords.slice(0, 25).map(k => `<tr>
    <td style="font-size:12px">${k.keyword}</td>
    <td class="mono">${k.product_line}</td>
    <td class="mono" style="color:var(--cyan)">${(k.search_volume/1000).toFixed(1)}K</td>
    <td><span class="tag" style="background:${k.priority==='high'?'#ef444420':'#3b82f620'};color:${k.priority==='high'?'var(--red)':'var(--blue)'}">${k.priority}</span></td>
    <td style="font-size:11px;color:var(--muted)">${k.word_type}</td>
  </tr>`).join('');

  el.innerHTML = `
    <div class="grid-2">
      <div class="card" style="animation-delay:.1s">
        <div class="card-head"><span>🔑 产品线搜索量</span></div>
        <div style="padding:20px">${linesHtml}</div>
      </div>
      <div class="card" style="animation-delay:.2s">
        <div class="card-head"><span>📋 关键词明细 Top 25</span></div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>关键词</th><th>产品线</th><th>月搜索</th><th>优先级</th><th>类型</th></tr></thead>
            <tbody>${kwRows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════
// 初始化 + 自动刷新
// ═══════════════════════════════════════
loadAll();
setInterval(loadAll, 5 * 60 * 1000); // 每5分钟刷新
</script>
</body>
</html>
